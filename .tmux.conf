# Allow tmux to pass clipboard operations through to xterm.js (OSC52)
set -g set-clipboard on
set -s set-clipboard on

# Enable mouse support (selection auto-copies)
set -g mouse on

# Use xterm-256color for proper colour and clipboard support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
